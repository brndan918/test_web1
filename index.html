<button id="copyAndClose">複製並關閉</button>

<script>
document.getElementById("copyAndClose").addEventListener("click", () => {
    navigator.clipboard.writeText("測試")
    .then(() => {
        alert("已複製文字：測試");
        window.close(); // 這裡會成功，因為是由點擊事件觸發
    })
    .catch(err => {
        alert("複製失敗: " + err);
    });
});
</script>
