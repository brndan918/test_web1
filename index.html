<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>自動複製並關閉</title>
</head>
<body>
<script>
window.onload = () => {
    // 複製文字
    navigator.clipboard.writeText("測試")
    .then(() => {
        console.log("已複製文字到剪貼簿");
    })
    .catch(err => {
        console.error("複製失敗:", err);
    })
    .finally(() => {
        // 嘗試關閉視窗
        window.close();
    });
};
</script>
</body>
</html>
