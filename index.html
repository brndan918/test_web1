<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>自動複製並延遲關閉</title>
</head>
<body>
<script>
// 解析 URL 參數
function getParam(name) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(name) || ""; // 沒有就回空字串
}

window.onload = () => {
    const textToCopy = getParam("text");

    if (!textToCopy) {
        console.warn("沒有要複製的文字");
        return;
    }

    navigator.clipboard.writeText(textToCopy)
    .then(() => {
        console.log("已複製文字到剪貼簿:", textToCopy);
    })
    .catch(err => {
        console.error("複製失敗:", err);
    })
    .finally(() => {
        // 延遲 50 毫秒再關閉視窗
        setTimeout(() => {
            window.close();
        }, 10);
    });
};
</script>
</body>
</html>
